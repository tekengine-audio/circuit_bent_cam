<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GLITCH·O·MATIC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

:root {
  --body-bg:#bab6b0;
  --cam-bg-a:#eae6e0;--cam-bg-b:#d8d4cc;--cam-bg-c:#cac6be;
  --pd:#b8b4ac;--ps:#9a9690;--pdeep:#72706a;
  --btn-top:#dedad2;--btn-bot:#cac6be;
  --btn-act-top:#b4b0a8;--btn-act-bot:#c4c0b8;
  --sld-a:#a6a29e;--sld-b:#c6c2ba;
  --sec-a:#d2cec6;--sec-b:#c6c2ba;
  --sec-lbl:#9a9690;
  --lcd-bg:#212d14;--lcd-fg:#88cc44;
  --accent:#cc2200;
  --scr-a:#1e1e1e;--scr-b:#0a0a0a;
  --vf-bg:#1a2a2a;
  --fl-a:#f2f0e8;--fl-b:#dad6ce;
}
body.dark {
  --body-bg:#1a1a1a;
  --cam-bg-a:#2e2e2e;--cam-bg-b:#242424;--cam-bg-c:#1e1e1e;
  --pd:#3a3a3a;--ps:#505050;--pdeep:#c8c4bc;
  --btn-top:#3a3836;--btn-bot:#2a2826;
  --btn-act-top:#1e1c1a;--btn-act-bot:#2a2826;
  --sld-a:#333;--sld-b:#222;
  --sec-a:#2e2e2e;--sec-b:#242424;
  --sec-lbl:#666;
  --lcd-bg:#0d1a08;--lcd-fg:#66ff33;
  --accent:#ff4422;
  --scr-a:#000;--scr-b:#000;
  --vf-bg:#0a1414;
  --fl-a:#3a3836;--fl-b:#2a2826;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--body-bg);
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:14px 0 32px;
  font-family:'Share Tech Mono',monospace;overflow-x:hidden;
  transition:background .3s;
}
.camera-body{
  width:342px;
  background:linear-gradient(160deg,var(--cam-bg-a) 0%,var(--cam-bg-b) 45%,var(--cam-bg-c) 100%);
  border-radius:20px 20px 26px 26px;padding:14px 14px 20px;
  box-shadow:
    inset 0 2px 5px rgba(255,255,255,.18),
    inset 0 -3px 5px rgba(0,0,0,.25),
    5px 10px 30px rgba(0,0,0,.5),
    -1px -1px 0 rgba(255,255,255,.12);
  user-select:none;transition:background .3s;
}

/* TOP */
.camera-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:2px 4px}
.brand-label{font-family:'VT323',monospace;font-size:23px;color:var(--pdeep);letter-spacing:3px;text-shadow:1px 1px 0 rgba(255,255,255,.1);transition:color .3s}
.top-right{display:flex;gap:6px;align-items:center}

/* THEME BUTTON */
.power-btn{
  width:28px;height:20px;
  background:linear-gradient(135deg,var(--fl-a),var(--fl-b));
  border-radius:4px;border:1px solid var(--ps);
  box-shadow:inset 0 1px 2px rgba(255,255,255,.15),0 1px 3px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.power-btn:active{transform:scale(.92)}

/* FLASH */
.flash-unit{
  width:30px;height:20px;
  background:linear-gradient(135deg,var(--fl-a),var(--fl-b));
  border-radius:4px;border:1px solid var(--ps);
  box-shadow:inset 0 1px 2px rgba(255,255,255,.15),inset 0 -1px 1px rgba(0,0,0,.1);
  display:flex;align-items:center;justify-content:center;overflow:hidden;transition:background .3s;
}
.flash-unit::after{content:'';width:16px;height:11px;background:linear-gradient(135deg,#fff4,#ff04);border-radius:2px}
.flash-unit.flashing::after{background:#ffc;box-shadow:0 0 10px #ff8,0 0 22px #ff4;animation:fl .35s ease-out}
@keyframes fl{0%{background:#fff;box-shadow:0 0 24px #fff}100%{background:#ff04;box-shadow:none}}

/* LCD */
.lcd-display{
  background:var(--lcd-bg);border-radius:4px;border:2px solid var(--pd);
  padding:2px 7px;box-shadow:inset 0 1px 4px rgba(0,0,0,.6);
  font-family:'VT323',monospace;font-size:13px;color:var(--lcd-fg);
  display:flex;justify-content:space-between;align-items:center;
  transition:background .3s,color .3s;
}

/* SCREEN */
.screen-housing{
  background:linear-gradient(180deg,var(--scr-a),var(--scr-b));
  border-radius:10px;padding:6px;
  box-shadow:inset 0 3px 8px rgba(0,0,0,.9),inset 0 0 0 1px rgba(255,255,255,.04);
  margin-bottom:12px;
}
.screen{width:100%;aspect-ratio:4/3;background:#111;border-radius:5px;overflow:hidden;position:relative}
#videoCanvas{width:100%;height:100%;display:block;image-rendering:pixelated}
.screen-scanlines{position:absolute;inset:0;border-radius:5px;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 3px)}
.screen-vignette{position:absolute;inset:0;border-radius:5px;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}
.cm{position:absolute;width:11px;height:11px;border-color:rgba(255,255,255,.35);border-style:solid}
.cm.tl{top:7px;left:7px;border-width:1px 0 0 1px}.cm.tr{top:7px;right:7px;border-width:1px 1px 0 0}
.cm.bl{bottom:7px;left:7px;border-width:0 0 1px 1px}.cm.br{bottom:7px;right:7px;border-width:0 1px 1px 0}
.rec-dot{position:absolute;top:9px;right:26px;width:8px;height:8px;border-radius:50%;background:#ff2200;box-shadow:0 0 6px #ff2200;display:none;animation:recblink .8s step-end infinite}
@keyframes recblink{50%{opacity:0}}
.proc-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);border-radius:5px;opacity:0;transition:opacity .1s;pointer-events:none}
.proc-ov.show{opacity:1}
.proc-txt{font-family:'VT323',monospace;font-size:22px;color:var(--lcd-fg);letter-spacing:2px;animation:blink .45s step-end infinite}
@keyframes blink{50%{opacity:0}}
.no-cam{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;font-size:17px;color:rgba(136,204,68,.5);text-align:center;line-height:1.6;letter-spacing:1px}

/* SECTION LABELS */
.sec{font-family:'VT323',monospace;font-size:11px;color:var(--sec-lbl);letter-spacing:2px;padding:0 2px 3px;margin-top:9px;display:block;transition:color .3s}

/* TOGGLE BUTTONS */
.tgrid{display:grid;gap:5px}
.tg4{grid-template-columns:repeat(4,1fr)}
.tbtn{
  background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  border:none;border-radius:7px;padding:6px 2px 5px;
  font-family:'VT323',monospace;font-size:11px;color:var(--pdeep);cursor:pointer;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.12),0 2px 3px rgba(0,0,0,.3),0 1px 0 var(--ps);
  text-align:center;letter-spacing:.5px;line-height:1.25;transition:all .05s,background .3s,color .3s;
}
.tbtn:active,.tbtn.active{
  background:linear-gradient(180deg,var(--btn-act-top),var(--btn-act-bot));
  box-shadow:inset 0 1px 3px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.08);
  transform:translateY(1px);
}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#666;margin-bottom:2px}
.tbtn.active .dot{background:var(--accent);box-shadow:0 0 5px var(--accent)}

/* LUT BUTTONS */
.lut-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.lbtn{
  border:none;border-radius:5px;padding:6px 0;font-family:'VT323',monospace;font-size:10px;
  cursor:pointer;text-align:center;line-height:1.2;color:#fff;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.3),0 2px 3px rgba(0,0,0,.3),0 1px 0 rgba(0,0,0,.2);
  transition:all .05s;letter-spacing:.3px;
}
.lbtn:active{transform:translateY(1px)}
.lbtn.sel{outline:2px solid rgba(255,255,255,.75);outline-offset:-1px}
.lbtn[data-lut=none]{background:linear-gradient(135deg,#6a6660,#3a3834);color:#ccc}
.lbtn[data-lut=thermal]{background:linear-gradient(135deg,#000080,#00ccff,#00ff44,#ffff00,#ff4400)}
.lbtn[data-lut=neon]{background:linear-gradient(135deg,#ff00ff,#00ffcc,#ffff00)}
.lbtn[data-lut=ygn]{background:linear-gradient(135deg,#ffff00,#00ff44);color:#333}
.lbtn[data-lut=invert]{background:linear-gradient(135deg,#111,#fff)}

/* SLIDERS */
.sliders-sec{
  background:linear-gradient(180deg,var(--sec-a),var(--sec-b));
  border-radius:9px;padding:9px 10px;margin-top:10px;
  box-shadow:inset 0 1px 4px rgba(0,0,0,.2),0 1px 0 rgba(255,255,255,.08);
  transition:background .3s;
}
.srow{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.srow:last-child{margin-bottom:0}
.slbl{font-family:'VT323',monospace;font-size:13px;color:var(--pdeep);width:38px;flex-shrink:0;letter-spacing:.5px;transition:color .3s}
input[type=range]{
  -webkit-appearance:none;flex:1;height:6px;
  background:linear-gradient(180deg,var(--sld-a),var(--sld-b));
  border-radius:3px;outline:none;box-shadow:inset 0 1px 2px rgba(0,0,0,.35);transition:background .3s;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:17px;height:17px;border-radius:50%;
  background:linear-gradient(135deg,var(--cam-bg-a),var(--cam-bg-c));
  box-shadow:0 1px 4px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.2);cursor:pointer;
}

/* EXPORT FORMAT ROW */
.fmt-row{display:flex;gap:4px;margin-top:5px}
.fmt-btn{
  flex:1;background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  border:none;border-radius:6px;padding:4px 0;
  font-family:'VT323',monospace;font-size:12px;color:var(--pdeep);
  cursor:pointer;box-shadow:inset 0 1px 1px rgba(255,255,255,.1),0 1px 3px rgba(0,0,0,.25),0 1px 0 var(--ps);
  transition:all .05s,background .3s,color .3s;letter-spacing:1px;
}
.fmt-btn.active{
  background:linear-gradient(180deg,var(--btn-act-top),var(--btn-act-bot));
  box-shadow:inset 0 1px 3px rgba(0,0,0,.3);color:var(--lcd-fg);
  transform:translateY(1px);
}

/* BOTTOM CONTROLS — 10% smaller = ~47px */
.bottom{display:flex;align-items:center;gap:7px;margin-top:14px}

.lens-btn{
  width:47px;height:47px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:radial-gradient(circle at 35% 33%,#555,#111);
  border:3px solid var(--ps);
  box-shadow:0 2px 7px rgba(0,0,0,.6),inset 0 1px 2px rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,box-shadow .2s;
}
.lens-btn:active{transform:scale(.93)}
.lens-btn.recording{
  border-color:#ff2200;
  box-shadow:0 2px 7px rgba(0,0,0,.6),0 0 12px rgba(255,34,0,.6),inset 0 1px 2px rgba(255,255,255,.12);
}
.lens-inner{position:relative;width:29px;height:29px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#334,#000);border:1px solid #444;box-shadow:inset 0 0 7px rgba(80,180,255,.22);display:flex;align-items:center;justify-content:center}
.lens-rec-icon{display:none;width:12px;height:12px;border-radius:50%;background:#ff2200;box-shadow:0 0 8px #ff2200}
.lens-btn.recording .lens-rec-icon{display:block;animation:recblink .8s step-end infinite}
.lens-btn.recording .lens-inner{background:radial-gradient(circle at 40% 35%,#500,#200)}

.lens-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.lens-mode-icon{position:absolute;color:rgba(255,255,255,.7);pointer-events:none}
.lens-mode-icon.lens-video{display:none}
.lens-btn.recording .lens-photo{display:none}
.lens-btn.recording .lens-video{display:block !important;color:rgba(255,100,100,.9)}
.lens-mode-label{font-family:'VT323',monospace;font-size:10px;color:var(--pdeep);letter-spacing:1px;transition:color .3s}
.lens-btn.recording + .lens-mode-label{color:var(--accent)}

.shutter{
  flex:1;height:50px;
  background:linear-gradient(180deg,var(--btn-top) 0%,var(--btn-bot) 50%,var(--btn-act-bot));
  border:none;border-radius:11px;cursor:pointer;
  font-family:'VT323',monospace;font-size:19px;color:var(--pdeep);letter-spacing:3px;
  box-shadow:inset 0 2px 2px rgba(255,255,255,.12),0 4px 0 var(--ps),0 5px 9px rgba(0,0,0,.3);
  transition:all .05s,background .3s,color .3s;
}
.shutter:active{transform:translateY(3px);box-shadow:inset 0 2px 3px rgba(0,0,0,.25),0 1px 0 var(--ps),0 2px 4px rgba(0,0,0,.2)}
.shutter.cap{background:linear-gradient(180deg,#cc3300,#aa1a00);color:#fff}
.shutter.video-mode{border:2px solid rgba(255,34,0,.5)}

/* SIDE BUTTONS (lens left, download right) */
.side-btn{
  width:47px;height:47px;flex-shrink:0;
  background:linear-gradient(180deg,var(--btn-top),var(--btn-bot));
  border:none;border-radius:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.12),0 4px 0 var(--ps),0 5px 7px rgba(0,0,0,.25);
  transition:all .05s,background .3s;
}
.side-btn:active{transform:translateY(3px);box-shadow:inset 0 1px 2px rgba(0,0,0,.25),0 1px 0 var(--ps)}

/* MEGA GLITCH button — when active glows red */
.side-btn.mega-active{
  background:linear-gradient(180deg,#660000,#440000);
  box-shadow:inset 0 1px 1px rgba(255,100,0,.2),0 4px 0 #220000,0 0 12px rgba(255,0,0,.4);
}
.side-btn.mega-active .mega-label{color:#ff6622}

.mega-label{font-family:'VT323',monospace;font-size:10px;color:var(--pdeep);letter-spacing:.5px;line-height:1;transition:color .3s}

.dl-label{font-family:'VT323',monospace;font-size:9px;color:var(--pdeep);letter-spacing:.3px;line-height:1;margin-top:1px;transition:color .3s}

#videoEl,#offCvs{display:none}

/* Save dialog (explicit Download / Share for APK WebView) */
.save-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.save-ov.show{opacity:1;visibility:visible}
.save-box{background:linear-gradient(180deg,var(--sec-a),var(--sec-b));border-radius:12px;padding:16px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.5);border:1px solid var(--ps)}
.save-msg{font-family:'VT323',monospace;font-size:14px;color:var(--pdeep);line-height:1.35;margin-bottom:12px;letter-spacing:.5px}
.save-btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:stretch}
.save-btns .tbtn{flex:1;min-width:70px;padding:8px 4px;font-size:10px}
.save-img-ov{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .2s}
.save-img-ov.show{opacity:1;visibility:visible}
.save-img-ov img{max-width:100%;max-height:100%;object-fit:contain;user-select:all;-webkit-user-select:all}
.save-img-ov .save-img-close{position:absolute;top:12px;right:12px;background:var(--btn-top);border:1px solid var(--ps);border-radius:8px;padding:8px 14px;font-family:'VT323',monospace;font-size:16px;color:var(--pdeep);cursor:pointer}
</style>
</head>
<body>

<video id="videoEl" autoplay playsinline muted></video>
<canvas id="offCvs"></canvas>

<div class="camera-body">

  <!-- TOP: theme btn LEFT, brand CENTER, lcd+flash RIGHT -->
  <div class="camera-top">
    <div class="power-btn" id="themeBtn" onclick="toggleTheme()" title="Day / Night">
      <svg id="themeIcon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#72706a" stroke-width="1.5" stroke-linecap="round">
        <circle cx="7" cy="7" r="3"/>
        <line x1="7" y1="1" x2="7" y2="2.5"/><line x1="7" y1="11.5" x2="7" y2="13"/>
        <line x1="1" y1="7" x2="2.5" y2="7"/><line x1="11.5" y1="7" x2="13" y2="7"/>
        <line x1="2.9" y1="2.9" x2="4" y2="4"/><line x1="10" y1="10" x2="11.1" y2="11.1"/>
        <line x1="11.1" y1="2.9" x2="10" y2="4"/><line x1="4" y1="10" x2="2.9" y2="11.1"/>
      </svg>
    </div>
    <div class="brand-label">GLITCH·O·MATIC</div>
    <div class="top-right">
      <div class="lcd-display" style="min-width:96px">
        <span id="fxCount">4 FX</span><span id="shots">00</span>
      </div>
      <div class="flash-unit" id="flashUnit"></div>
    </div>
  </div>

  <!-- SCREEN -->
  <div class="screen-housing">
    <div class="screen">
      <canvas id="videoCanvas"></canvas>
      <div class="screen-scanlines"></div>
      <div class="screen-vignette"></div>
      <div class="cm tl"></div><div class="cm tr"></div>
      <div class="cm bl"></div><div class="cm br"></div>
      <div class="rec-dot" id="recDot"></div>
      <div class="proc-ov" id="procOv"><span class="proc-txt">PROCESSING...</span></div>
      <div class="no-cam" id="noCam">TAP SHOOT<br>TO ACTIVATE<br>CAMERA</div>
    </div>
  </div>

  <!-- DISPLACEMENT -->
  <span class="sec">DISPLACEMENT</span>
  <div class="tgrid tg4" style="margin-bottom:9px">
    <button class="tbtn active" id="btnSort"   onclick="tog('sort')"><div class="dot"></div><br>SORT<br>H</button>
    <button class="tbtn active" id="btnSortV"  onclick="tog('sortV')"><div class="dot"></div><br>SORT<br>V</button>
    <button class="tbtn active" id="btnGlitch" onclick="tog('glitch')"><div class="dot"></div><br>COMP<br>ARTF</button>
    <button class="tbtn"        id="btnNoise"  onclick="tog('noise')"><div class="dot"></div><br>CLR<br>NOISE</button>
  </div>

  <!-- MIRROR — 4 options + OFF -->
  <span class="sec">MIRROR</span>
  <div class="tgrid tg4" style="margin-bottom:9px">
    <button class="tbtn" id="btnMirror"     onclick="togMirror('mirror')"><div class="dot"></div><br>HORIZ</button>
    <button class="tbtn" id="btnMirrorV"    onclick="togMirror('mirrorV')"><div class="dot"></div><br>VERT</button>
    <button class="tbtn" id="btnMirrorBoth" onclick="togMirror('mirrorBoth')"><div class="dot"></div><br>4×</button>
    <button class="tbtn active" id="btnMirrorOff" onclick="togMirror('off')"><div class="dot"></div><br>OFF</button>
  </div>

  <!-- COLOR MODE -->
  <span class="sec">COLOR MODE</span>
  <div class="lut-row" style="margin-bottom:9px">
    <button class="lbtn sel" data-lut="none"    onclick="selLut('none')">OFF</button>
    <button class="lbtn"     data-lut="thermal" onclick="selLut('thermal')">THERM</button>
    <button class="lbtn"     data-lut="neon"    onclick="selLut('neon')">NEON</button>
    <button class="lbtn"     data-lut="ygn"     onclick="selLut('ygn')">Y·GRN</button>
    <button class="lbtn"     data-lut="invert"  onclick="selLut('invert')">INV</button>
  </div>

  <!-- SLIDERS -->
  <div class="sliders-sec">
    <div class="srow"><span class="slbl">SORT</span> <input type="range" id="sSort"   min="0" max="100" value="40"></div>
    <div class="srow"><span class="slbl">COMP</span> <input type="range" id="sGlitch" min="0" max="100" value="50"></div>
    <div class="srow"><span class="slbl">LUT</span>  <input type="range" id="sLut"    min="0" max="100" value="75"></div>
    <div class="srow"><span class="slbl">NOISE</span><input type="range" id="sNoise"  min="0" max="100" value="30"></div>
    <div class="srow"><span class="slbl">BLACK</span><input type="range" id="sShadow" min="0" max="100" value="0" title="Crush shadows to full black (silhouettes)"></div>
  </div>

  <!-- EXPORT: Low-res / HD / 2K / 4K -->
  <span class="sec">EXPORT</span>
  <div class="fmt-row" style="margin-bottom:0">
    <button class="fmt-btn active" id="fmtLowres" onclick="setFmt('lowres')">LOW-RES</button>
    <button class="fmt-btn"        id="fmtHd"     onclick="setFmt('hd')">HD</button>
    <button class="fmt-btn"        id="fmt2k"     onclick="setFmt('2k')">2K</button>
    <button class="fmt-btn"        id="fmt4k"     onclick="setFmt('4k')">4K</button>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="bottom">

    <!-- LEFT: Photo / Video mode toggle (clearly labeled) -->
    <div class="lens-wrap" title="Switch between photo and video mode">
      <div class="lens-btn" id="lensBtn" onclick="toggleVideo()">
        <div class="lens-inner">
          <div class="lens-rec-icon"></div>
          <svg class="lens-mode-icon lens-photo" id="lensPhotoIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <svg class="lens-mode-icon lens-video" id="lensVideoIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l4-2v8l-4-2"/></svg>
        </div>
      </div>
      <span class="lens-mode-label" id="lensModeLabel">VIDEO</span>
    </div>

    <!-- CENTER: SHOOT / REC -->
    <button class="shutter" id="shutterBtn" onclick="handleShutter()">● SHOOT</button>

    <!-- RIGHT: MEGA GLITCH toggle -->
    <button class="side-btn" id="megaBtn" onclick="toggleMega()" title="Mega Glitch boost">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="var(--pdeep)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="megaIcon">
        <polygon points="9,2 11.5,7 17,7.5 13,11.5 14.5,17 9,14 3.5,17 5,11.5 1,7.5 6.5,7"/>
      </svg>
      <span class="mega-label" id="megaLabel">MEGA</span>
    </button>

  </div>

  <!-- DOWNLOAD: save last capture (opens save dialog with Download + Share) -->
  <div style="display:flex;gap:6px;margin-top:8px">
    <button class="side-btn" style="flex:1;flex-direction:row;gap:5px;height:36px;border-radius:8px;width:auto" onclick="dlLast()" title="Save last capture">
      <svg width="16" height="15" viewBox="0 0 16 15" fill="none" stroke="var(--pdeep)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 1v9M5 7l3 3 3-3"/><path d="M2 13h12"/>
      </svg>
      <span class="dl-label" id="fmtLabel">SAVE LOW-RES</span>
    </button>
  </div>

  <!-- Save dialog: Open image (long-press to save) works when Download/Share fail in WebView -->
  <div class="save-ov" id="saveOv" onclick="if(event.target===this){ this.classList.remove('show'); savePendingUrl=null; }">
    <div class="save-box">
      <p class="save-msg" id="saveMsg">In app, Download often fails. Use <strong>OPEN IMAGE</strong> then long-press the image and choose &quot;Save image&quot; to save to Photos.</p>
      <div class="save-btns">
        <button type="button" class="tbtn" onclick="saveDialogOpen()">OPEN IMAGE</button>
        <button type="button" class="tbtn" onclick="saveDialogDownload()">DOWNLOAD</button>
        <button type="button" class="tbtn" onclick="saveDialogShare()">SHARE</button>
      </div>
    </div>
  </div>

  <!-- Fullscreen image viewer when OPEN IMAGE is used (long-press to save if new tab is blocked) -->
  <div class="save-img-ov" id="saveImgOv">
    <img id="saveImgEl" alt="Save" src="" style="pointer-events:auto">
    <button type="button" class="save-img-close" onclick="closeSaveImg()">Close</button>
  </div>

</div>

<script>
// ── STATE ──
const fx = {sort:true,sortV:true,glitch:true,noise:false};
let mirrorMode='off', lut='none', fmt='lowres';
let darkMode=false, megaMode=false;
let camActive=false, animF=null, shots=0, lastURL=null;
let videoMode=false, mediaRec=null, recChunks=[];

const W=320, H=240;
const vid   = document.getElementById('videoEl');
const mcvs  = document.getElementById('videoCanvas');
const ocvs  = document.getElementById('offCvs');
const ctx   = mcvs.getContext('2d');
const oct   = ocvs.getContext('2d',{willReadFrequently:true});
mcvs.width=W; mcvs.height=H; ocvs.width=W; ocvs.height=H;

// HD canvases (2x, 4x, 8x, 16x for higher-resolution export)
const hd2cvs=document.createElement('canvas'); hd2cvs.width=W*2; hd2cvs.height=H*2;
const hd2ctx=hd2cvs.getContext('2d',{willReadFrequently:true});
const hd4cvs=document.createElement('canvas'); hd4cvs.width=W*4; hd4cvs.height=H*4;
const hd4ctx=hd4cvs.getContext('2d',{willReadFrequently:true});
const hd8cvs=document.createElement('canvas'); hd8cvs.width=W*8; hd8cvs.height=H*8;
const hd8ctx=hd8cvs.getContext('2d',{willReadFrequently:true});
const hd16cvs=document.createElement('canvas'); hd16cvs.width=W*16; hd16cvs.height=H*16;
const hd16ctx=hd16cvs.getContext('2d',{willReadFrequently:true});

// ── THEME ──
function toggleTheme(){
  darkMode=!darkMode;
  document.body.classList.toggle('dark',darkMode);
  const ico=document.getElementById('themeIcon');
  if(darkMode){
    ico.innerHTML=`<path d="M11 7A4 4 0 1 1 7 3a6 6 0 0 0 4 4z" fill="#66ff33" stroke="none"/>`;
    ico.setAttribute('fill','#66ff33'); ico.style.stroke='none';
  } else {
    ico.innerHTML=`<circle cx="7" cy="7" r="3"/>
      <line x1="7" y1="1" x2="7" y2="2.5"/><line x1="7" y1="11.5" x2="7" y2="13"/>
      <line x1="1" y1="7" x2="2.5" y2="7"/><line x1="11.5" y1="7" x2="13" y2="7"/>
      <line x1="2.9" y1="2.9" x2="4" y2="4"/><line x1="10" y1="10" x2="11.1" y2="11.1"/>
      <line x1="11.1" y1="2.9" x2="10" y2="4"/><line x1="4" y1="10" x2="2.9" y2="11.1"/>`;
    ico.setAttribute('fill','none'); ico.style.stroke='#72706a';
  }
}

// ── MEGA GLITCH ──
function toggleMega(){
  megaMode=!megaMode;
  const btn=document.getElementById('megaBtn');
  btn.classList.toggle('mega-active',megaMode);
  document.getElementById('megaIcon').setAttribute('stroke', megaMode?'#ff6622':'var(--pdeep)');
}

// Mega multiplier: when on, effect amounts are doubled (capped at 1.0→2.0 scale)
function getAmt(id){ return +document.getElementById(id).value/100 * (megaMode?2:1); }

// ── UI ──
function cap(s){return s[0].toUpperCase()+s.slice(1)}

function tog(name){
  fx[name]=!fx[name];
  document.getElementById('btn'+cap(name)).classList.toggle('active',fx[name]);
}

function togMirror(name){
  mirrorMode=(mirrorMode===name&&name!=='off')?'off':name;
  ['mirror','mirrorV','mirrorBoth','off'].forEach(k=>{
    const id='btnMirror'+(k==='off'?'Off':k==='mirror'?'':cap(k));
    const el=document.getElementById(id);
    if(el) el.classList.toggle('active',mirrorMode===k);
  });
}

function selLut(l){
  lut=l;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.toggle('sel',b.dataset.lut===l));
}

function setFmt(f){
  fmt=f;
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
  const idMap={lowres:'fmtLowres',hd:'fmtHd','2k':'fmt2k','4k':'fmt4k'};
  const el=document.getElementById(idMap[f]);
  if(el) el.classList.add('active');
  const labels={lowres:'SAVE LOW-RES',hd:'SAVE HD','2k':'SAVE 2K','4k':'SAVE 4K'};
  document.getElementById('fmtLabel').textContent=labels[f]||'SAVE';
}

// ── CAMERA ──
async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false});
    vid.srcObject=s;
  }catch(e){
    const s=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720}},audio:false});
    vid.srcObject=s;
  }
  await vid.play();
  camActive=true;
  document.getElementById('noCam').style.display='none';
  loop();
}

function loop(){if(!camActive)return;render();animF=requestAnimationFrame(loop)}

// ── RENDER (display size) ──
function render(capMode=false){
  oct.drawImage(vid,0,0,W,H);
  const id=oct.getImageData(0,0,W,H);
  const d=id.data;

  const sa=getAmt('sSort'), ga=getAmt('sGlitch'), la=getAmt('sLut'), na=getAmt('sNoise'), sh=getAmt('sShadow');

  if(fx.noise)     clrNoise(d,na);
  if(lut!=='none') applyLUT(d,lut,la,W,H);
  if(fx.sort)      sortH(d,sa,W,H);
  if(fx.sortV)     sortV(d,sa*.75,W,H);
  if(fx.glitch)    compArt(d,ga,W,H);
  applyMirrorMode(d,W,H);
  if(sh>0) applyShadowCrush(d,sh,W,H);

  oct.putImageData(id,0,0);
  ctx.drawImage(ocvs,0,0,W,H);

  if(capMode){
    const scaleMap={lowres:2,hd:4,'2k':8,'4k':16};
    const scale=scaleMap[fmt]||2;
    return renderHD(scale);
  }
}

// ── HD RENDER ──
function renderHD(scale){
  const WW=W*scale, HH=H*scale;
  const hdc = scale===16?hd16ctx:scale===8?hd8ctx:scale===4?hd4ctx:hd2ctx;
  const hcvs = scale===16?hd16cvs:scale===8?hd8cvs:scale===4?hd4cvs:hd2cvs;
  hdc.drawImage(vid,0,0,WW,HH);
  const id=hdc.getImageData(0,0,WW,HH);
  const d=id.data;
  const sa=getAmt('sSort'), ga=getAmt('sGlitch'), la=getAmt('sLut'), na=getAmt('sNoise'), sh=getAmt('sShadow');
  if(fx.noise)     clrNoise(d,na);
  if(lut!=='none') applyLUT(d,lut,la,WW,HH);
  if(fx.sort)      sortH(d,sa,WW,HH);
  if(fx.sortV)     sortV(d,sa*.75,WW,HH);
  if(fx.glitch)    compArt(d,ga,WW,HH);
  applyMirrorModeWH(d,WW,HH);
  if(sh>0) applyShadowCrush(d,sh,WW,HH);
  hdc.putImageData(id,0,0);
  return hcvs.toDataURL('image/png');
}

// ── LUT ──
function applyLUT(d,type,amt,WW,HH){
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const lv=(r*77+g*150+b*29)>>8;
    let nr=r,ng=g,nb=b;
    if(type==='thermal'){nr=tR(lv);ng=tG(lv);nb=tB(lv);}
    else if(type==='neon'){
      nr=cl(Math.sin(lv/255*Math.PI*2.5)*255*(1+amt*.8));
      ng=cl(Math.cos(lv/255*Math.PI*1.8+1)*255*(1+amt*.7));
      nb=cl(Math.sin(lv/255*Math.PI*3.2+2)*255*(1+amt));
      const st=Math.max(3,Math.round(6-Math.min(amt,.99)*3.5));
      nr=post(nr,st);ng=post(ng,st);nb=post(nb,st);
    }else if(type==='ygn'){
      nr=cl(lv+g*amt*1.3);ng=cl(lv+(g-r)*amt*.9+25*amt);nb=cl(b*(1-amt*.95));
      const st=Math.max(3,Math.round(8-Math.min(amt,.99)*5));
      nr=post(nr,st);ng=post(ng,st);nb=post(nb,st);
    }else if(type==='invert'){
      nr=255-r;ng=255-g;nb=255-b;
      const avg=(nr+ng+nb)/3;
      nr=cl(avg+(nr-avg)*(1+amt*1.6));ng=cl(avg+(ng-avg)*(1+amt*1.6));nb=cl(avg+(nb-avg)*(1+amt*1.6));
      const st=Math.max(3,Math.round(8-Math.min(amt,.99)*5));
      nr=post(nr,st);ng=post(ng,st);nb=post(nb,st);
    }
    const a=Math.min(amt,1);
    d[i]=Math.round(r*(1-a)+nr*a);d[i+1]=Math.round(g*(1-a)+ng*a);d[i+2]=Math.round(b*(1-a)+nb*a);
  }
}
function tR(t){if(t<96)return 0;if(t<160)return cl((t-96)*4);return 255}
function tG(t){if(t<64)return cl(t*2.5);if(t<192)return 255;return cl(255-(t-192)*4)}
function tB(t){if(t<64)return cl(t*4);if(t<128)return cl(255-(t-64)*4);return 0}
function cl(v){return Math.max(0,Math.min(255,Math.round(v)))}
function post(v,s){return Math.round(v/(255/s))*(255/s)|0}

// ── PIXEL SORT ──
function lv(d,i){return(d[i]*77+d[i+1]*150+d[i+2]*29)>>8}

function sortH(d,amt,WW,HH){
  const thr=255*(1-Math.min(amt,.99)*.82-.08);
  for(let y=0;y<HH;y++){let rs=-1;
    for(let x=0;x<=WW;x++){
      const l=x<WW?lv(d,(y*WW+x)*4):-1;
      if(l>thr&&rs<0)rs=x;if(l<=thr&&rs>=0){sRowSeg(d,y,rs,x,WW);rs=-1}
    }
  }
}
function sRowSeg(d,y,x0,x1,WW){
  const len=x1-x0;if(len<2)return;
  const px=[];for(let x=x0;x<x1;x++){const i=(y*WW+x)*4;px.push([d[i],d[i+1],d[i+2],d[i+3],lv(d,i)])}
  px.sort((a,b)=>a[4]-b[4]);
  for(let j=0;j<len;j++){const i=(y*WW+x0+j)*4;d[i]=px[j][0];d[i+1]=px[j][1];d[i+2]=px[j][2];d[i+3]=px[j][3]}
}
function sortV(d,amt,WW,HH){
  const thr=255*(1-Math.min(amt,.99)*.82-.08);
  for(let x=0;x<WW;x++){let rs=-1;
    for(let y=0;y<=HH;y++){
      const l=y<HH?lv(d,(y*WW+x)*4):-1;
      if(l>thr&&rs<0)rs=y;if(l<=thr&&rs>=0){sColSeg(d,x,rs,y,WW);rs=-1}
    }
  }
}
function sColSeg(d,x,y0,y1,WW){
  const len=y1-y0;if(len<2)return;
  const px=[];for(let y=y0;y<y1;y++){const i=(y*WW+x)*4;px.push([d[i],d[i+1],d[i+2],d[i+3],lv(d,i)])}
  px.sort((a,b)=>a[4]-b[4]);
  for(let j=0;j<len;j++){const i=(y0+j)*WW*4+x*4;d[i]=px[j][0];d[i+1]=px[j][1];d[i+2]=px[j][2];d[i+3]=px[j][3]}
}

// ── COMP ARTIFACTS ──
function compArt(d,amt,WW,HH){
  const bs=Math.max(4,Math.round(6+(1-Math.min(amt,1))*10));
  const n=Math.round(Math.min(amt,2)*16+2);
  for(let g=0;g<n;g++){
    const bx=(Math.random()*(WW/bs)|0)*bs, by=(Math.random()*(HH/bs)|0)*bs;
    const bw=bs*(1+(Math.random()*6|0));
    const sh=((Math.random()-.5)*24*Math.min(amt,2))|0;
    for(let dy=0;dy<bs;dy++) for(let dx=0;dx<bw;dx++){
      const sx=Math.min(WW-1,Math.max(0,bx+dx)), sy=Math.min(HH-1,Math.max(0,by+dy));
      const tx=Math.min(WW-1,Math.max(0,bx+dx+sh));
      const si=(sy*WW+sx)*4, ti=(sy*WW+tx)*4;
      d[ti]=d[si];d[ti+1]=d[Math.min(d.length-4,si+4)];d[ti+2]=d[Math.max(0,si-4)];
    }
  }
}

// ── COLOR NOISE ──
function clrNoise(d,amt){
  const str=Math.min(amt,2)*90;
  for(let i=0;i<d.length;i+=4){
    d[i]=cl(d[i]+(Math.random()-.5)*str*2);
    d[i+1]=cl(d[i+1]+(Math.random()-.5)*str*1.4);
    d[i+2]=cl(d[i+2]+(Math.random()-.5)*str*2.8);
  }
}

// ── MIRRORS ──
function applyMirrorMode(d,WW,HH){ applyMirrorModeWH(d,WW,HH) }
function applyMirrorModeWH(d,WW,HH){
  if(mirrorMode==='mirror')mirH(d,WW,HH);
  else if(mirrorMode==='mirrorV')mirV(d,WW,HH);
  else if(mirrorMode==='mirrorBoth'){mirH(d,WW,HH);mirV(d,WW,HH)}
}
function mirH(d,WW,HH){for(let y=0;y<HH;y++) for(let x=0;x<WW/2;x++){const li=(y*WW+x)*4,ri=(y*WW+(WW-1-x))*4;d[ri]=d[li];d[ri+1]=d[li+1];d[ri+2]=d[li+2];d[ri+3]=d[li+3]}}
function mirV(d,WW,HH){for(let y=0;y<HH/2;y++) for(let x=0;x<WW;x++){const ti=(y*WW+x)*4,bi=((HH-1-y)*WW+x)*4;d[bi]=d[ti];d[bi+1]=d[ti+1];d[bi+2]=d[ti+2];d[bi+3]=d[ti+3]}}

// ── SHADOW CRUSH (silhouettes / full black) ──
function applyShadowCrush(d,amt,WW,HH){
  if(amt<=0) return;
  const t=Math.min(amt,1);
  for(let i=0;i<d.length;i+=4){
    const luma=(d[i]*77+d[i+1]*150+d[i+2]*29)>>8;
    const factor=1-t*(1-luma/255);
    d[i]=cl(d[i]*factor); d[i+1]=cl(d[i+1]*factor); d[i+2]=cl(d[i+2]*factor);
  }
}

// ── VIDEO MODE ──
function toggleVideo(){
  if(!camActive){alert('Tap SHOOT to activate camera first');return}
  if(!videoMode){
    videoMode=true;
    document.getElementById('lensBtn').classList.add('recording');
    document.getElementById('lensModeLabel').textContent='PHOTO';
    document.getElementById('lensModeLabel').title='Tap to switch back to photo mode';
    document.getElementById('shutterBtn').textContent='● REC';
    document.getElementById('shutterBtn').classList.add('video-mode');
  }else{
    if(mediaRec&&mediaRec.state==='recording')stopRec();
    videoMode=false;
    document.getElementById('lensBtn').classList.remove('recording');
    document.getElementById('lensModeLabel').textContent='VIDEO';
    document.getElementById('lensModeLabel').title='Tap to switch to video mode';
    document.getElementById('shutterBtn').textContent='● SHOOT';
    document.getElementById('shutterBtn').classList.remove('video-mode');
  }
}

function startRec(){
  recChunks=[];
  const stream=mcvs.captureStream(30);
  // prefer mp4, fallback webm — video is always saved as best available format
  const mimeType=['video/mp4','video/webm;codecs=vp9','video/webm'].find(t=>MediaRecorder.isTypeSupported(t))||'video/webm';
  mediaRec=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:8_000_000});
  mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data)};
  mediaRec.onstop=exportVideo;
  mediaRec.start(100);
  document.getElementById('recDot').style.display='block';
  document.getElementById('shutterBtn').textContent='■ STOP';
  document.getElementById('shutterBtn').classList.add('cap');
}
function stopRec(){
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
  document.getElementById('recDot').style.display='none';
  document.getElementById('shutterBtn').textContent='● REC';
  document.getElementById('shutterBtn').classList.remove('cap');
}
function exportVideo(){
  const ext=(mediaRec.mimeType||'').includes('mp4')?'mp4':'webm';
  const blob=new Blob(recChunks,{type:mediaRec.mimeType||'video/webm'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`glitch_${Date.now()}.${ext}`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  shots++;document.getElementById('shots').textContent=String(shots).padStart(2,'0');
}

// ── SHUTTER ──
async function handleShutter(){
  if(!camActive){await startCam();return}
  if(videoMode){(mediaRec&&mediaRec.state==='recording')?stopRec():startRec();return}
  // PHOTO
  if(animF)cancelAnimationFrame(animF);
  const btn=document.getElementById('shutterBtn');
  btn.classList.add('cap');
  document.getElementById('flashUnit').classList.add('flashing');
  setTimeout(()=>document.getElementById('flashUnit').classList.remove('flashing'),350);
  document.getElementById('procOv').classList.add('show');
  await new Promise(r=>setTimeout(r,80));
  lastURL=render(true);
  shots++;document.getElementById('shots').textContent=String(shots).padStart(2,'0');
  await new Promise(r=>setTimeout(r,520));
  document.getElementById('procOv').classList.remove('show');
  btn.classList.remove('cap');
  requestSave(lastURL,'png');
  loop();
}

function dl(url,ext){
  const a=document.createElement('a');a.href=url;a.download=`glitch_${Date.now()}.${ext}`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

let savePendingUrl=null, savePendingExt='png';
function requestSave(url,ext){
  if(!url){alert('Take a shot first!');return}
  savePendingUrl=url; savePendingExt=ext||'png';
  document.getElementById('saveOv').classList.add('show');
}
function saveDialogOpen(){
  document.getElementById('saveOv').classList.remove('show');
  if(!savePendingUrl) return;
  document.getElementById('saveImgEl').src=savePendingUrl;
  document.getElementById('saveImgOv').classList.add('show');
  savePendingUrl=null;
}
function closeSaveImg(){
  document.getElementById('saveImgOv').classList.remove('show');
  document.getElementById('saveImgEl').src='';
}
function saveDialogDownload(){
  document.getElementById('saveOv').classList.remove('show');
  if(savePendingUrl) dl(savePendingUrl,savePendingExt);
  savePendingUrl=null;
}
function saveDialogShare(){
  document.getElementById('saveOv').classList.remove('show');
  if(savePendingUrl) shareImage(savePendingUrl,savePendingExt);
  savePendingUrl=null;
}
function shareImage(dataUrl,ext){
  if(!navigator.share){
    alert('Share not available in this browser. Try Download instead.');
    return;
  }
  try {
    const bin=atob(dataUrl.split(',')[1]);
    const buf=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
    const blob=new Blob([buf],{type:'image/png'});
    const file=new File([blob],`glitch_${Date.now()}.${ext||'png'}`,{type:'image/png'});
    navigator.share({files:[file],title:'Glitch',text:''}).catch(function(){ alert('Share failed or cancelled. Try Download instead.'); });
  }catch(e){
    alert('Share failed. Try Download instead.');
  }
}

function dlLast(){
  if(!lastURL){alert('Take a shot first!');return}
  requestSave(lastURL,'png');
}

// Init
togMirror('off');
</script>
</body>
